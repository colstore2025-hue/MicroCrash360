<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MicroCash360 💸</title>

  <!-- 🧠 SEO básico -->
  <meta name="description" content="MicroCash360 - Préstamos rápidos y seguros" />

  <!-- 🎨 Estilos -->
  <link rel="stylesheet" href="/styles.css" />

  <!-- 🚀 Favicon (opcional) -->
  <!-- <link rel="icon" href="/favicon.ico" /> -->

</head>

<body>

  <!-- 🔥 APP ROOT -->
  <div id="app"></div>

  <!-- 🔐 Firebase Recaptcha -->
  <div id="recaptcha-container"></div>

  <!-- ⚠️ LOADER (por si algo falla) -->
  <div id="loader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0b0f1a;display:flex;align-items:center;justify-content:center;color:white;">
    <h2>🚀 Cargando MicroCash360...</h2>
  </div>

  <!-- 🚀 SCRIPT PRINCIPAL -->
  <script type="module">
    console.log("🔥 index.html cargado");

    try {
      await import("./app.js");

      console.log("✅ app.js cargado correctamente");

      // Ocultar loader
      document.getElementById("loader").style.display = "none";

    } catch (err) {
      console.error("❌ Error cargando app:", err);

      document.getElementById("loader").innerHTML = `
        <div style="text-align:center">
          <h2>❌ Error cargando la app</h2>
          <p>Revisa consola (F12)</p>
        </div>
      `;
    }
  </script>

</body>
</html>
